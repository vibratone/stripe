<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stripe Checkout Launcher</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #16181d;
      --muted: #616774;
      --border: #e5e7ef;
      --accent: #635bff;
      --accent-hover: #554cf0;
      --danger: #c73b3b;
      --success: #157347;
      --shadow: 0 12px 32px rgba(17, 24, 39, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 24px 24px 12px;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .subtext {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .body {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .status {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fafbff;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      margin-top: 4px;
      background: var(--accent);
      flex: 0 0 auto;
      animation: pulse 1.3s infinite ease-in-out;
    }

    .dot.success { background: var(--success); animation: none; }
    .dot.error { background: var(--danger); animation: none; }

    .status-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .status-copy {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
      word-break: break-word;
    }

    .summary {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .summary-header {
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      background: #fafbff;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .summary-body {
      padding: 6px 16px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .summary-row:last-child { border-bottom: 0; }

    .summary-key {
      color: var(--muted);
      font-weight: 600;
    }

    .summary-value {
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button, a.button-link {
      appearance: none;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    button:hover, a.button-link:hover { background: var(--accent-hover); }

    button.secondary, a.button-link.secondary {
      background: #eef1ff;
      color: #363d4d;
    }

    button.secondary:hover, a.button-link.secondary:hover { background: #e2e7ff; }

    pre {
      margin: 0;
      padding: 14px 16px;
      background: #0f172a;
      color: #d8e2ff;
      border-radius: 14px;
      font-size: 12px;
      line-height: 1.55;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hidden { display: none !important; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.82); opacity: 0.55; }
    }

    @media (max-width: 640px) {
      .summary-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="eyebrow">Stripe Checkout</div>
      <h1>Preparing secure checkout…</h1>
      <p class="subtext">
        This page sends your booking data to your Make.com webhook, waits for the server to create the Stripe Checkout Session,
        and then redirects the customer to Stripe.
      </p>
    </div>

    <div class="body">
      <div class="status">
        <div class="dot" id="statusDot"></div>
        <div>
          <p class="status-title" id="statusTitle">Starting request</p>
          <p class="status-copy" id="statusCopy">Reading launch data.</p>
        </div>
      </div>

      <div class="summary" id="summaryBox">
        <div class="summary-header">Request snapshot</div>
        <div class="summary-body" id="summaryBody"></div>
      </div>

      <div class="actions hidden" id="actionsBox">
        <a class="button-link" id="manualLink" href="#" target="_top" rel="noopener">Continue to Stripe</a>
        <button class="secondary" id="retryButton" type="button">Try again</button>
      </div>

      <div id="debugBox" class="hidden">
        <div class="summary-header" style="margin-bottom:12px;">Debug output</div>
        <pre id="debugOutput"></pre>
      </div>
    </div>
  </div>

  <script>
    const els = {
      statusDot: document.getElementById("statusDot"),
      statusTitle: document.getElementById("statusTitle"),
      statusCopy: document.getElementById("statusCopy"),
      summaryBody: document.getElementById("summaryBody"),
      actionsBox: document.getElementById("actionsBox"),
      manualLink: document.getElementById("manualLink"),
      retryButton: document.getElementById("retryButton"),
      debugBox: document.getElementById("debugBox"),
      debugOutput: document.getElementById("debugOutput")
    };

    function setStatus(state, title, copy) {
      els.statusTitle.textContent = title;
      els.statusCopy.textContent = copy;
      els.statusDot.className = "dot" + (state ? " " + state : "");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatValue(value) {
      if (value === undefined || value === null || value === "") return "—";
      if (typeof value === "object") return JSON.stringify(value, null, 2);
      return String(value);
    }

    function renderSummary(payload) {
      const rows = [
        ["mode", payload.mode || "payment"],
        ["success_url", payload.success_url],
        ["cancel_url", payload.cancel_url],
        ["customer_email", payload.customer_email],
        ["client_reference_id", payload.client_reference_id],
        ["line_items", payload.line_items],
        ["discounts", payload.discounts],
        ["metadata", payload.metadata]
      ].filter(([, value]) => value !== undefined);

      els.summaryBody.innerHTML = "";

      for (const [key, value] of rows) {
        const row = document.createElement("div");
        row.className = "summary-row";
        row.innerHTML =
          '<div class="summary-key">' + escapeHtml(key) + '</div>' +
          '<div class="summary-value">' + escapeHtml(formatValue(value)) + '</div>';
        els.summaryBody.appendChild(row);
      }
    }

    function base64UrlDecodeUtf8(text) {
      const normalized = text.replace(/-/g, "+").replace(/_/g, "/");
      const padLength = (4 - (normalized.length % 4 || 4)) % 4;
      const padded = normalized + "=".repeat(padLength);
      const binary = atob(padded);
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    function getLauncherConfig() {
      const hash = window.location.hash.replace(/^#/, "").trim();
      if (!hash) throw new Error("No launch payload was found in the URL.");
      const json = base64UrlDecodeUtf8(hash);
      return JSON.parse(json);
    }

    function getCheckoutUrl(responseData) {
      if (!responseData || typeof responseData !== "object") return null;

      return (
        responseData.checkout_url ||
        responseData.url ||
        responseData.checkoutUrl ||
        responseData.session_url ||
        (responseData.data && (responseData.data.checkout_url || responseData.data.url)) ||
        (responseData.session && responseData.session.url) ||
        null
      );
    }

    async function runCheckout() {
      const launcherConfig = getLauncherConfig();
      const webhookUrl = launcherConfig.webhook_url;
      const payload = launcherConfig.payload || {};
      const debug = launcherConfig.debug === true;

      if (!webhookUrl) throw new Error("webhook_url is missing.");
      if (!payload.success_url) throw new Error("success_url is missing.");
      if (!payload.cancel_url) throw new Error("cancel_url is missing.");

      renderSummary(payload);

      if (debug) {
        els.debugBox.classList.remove("hidden");
        els.debugOutput.textContent = JSON.stringify({ webhookUrl, payload }, null, 2);
      }

      setStatus("", "Contacting Make.com", "Sending the checkout request to your server-side automation.");

      const response = await fetch(webhookUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const text = await response.text();
      let data;

      try {
        data = text ? JSON.parse(text) : {};
      } catch (_) {
        data = { raw: text };
      }

      if (debug) {
        els.debugOutput.textContent = JSON.stringify({
          webhookUrl,
          payload,
          responseStatus: response.status,
          responseData: data
        }, null, 2);
      }

      if (!response.ok) {
        throw new Error(
          ("Webhook returned HTTP " + response.status + ". " + (data.message || data.error || "")).trim()
        );
      }

      const checkoutUrl = getCheckoutUrl(data);

      if (!checkoutUrl || !/^https?:\/\//i.test(checkoutUrl)) {
        throw new Error("The webhook responded successfully, but no valid checkout URL was found.");
      }

      els.manualLink.href = checkoutUrl;
      els.actionsBox.classList.remove("hidden");

      setStatus("success", "Checkout ready", "Redirecting the customer to Stripe now.");

      const targetWindow = window.top && window.top !== window ? window.top : window;
      targetWindow.location.href = checkoutUrl;
    }

    async function boot() {
      try {
        setStatus("", "Reading inputs", "Checking the launch configuration.");
        await runCheckout();
      } catch (error) {
        console.error("Stripe Checkout launcher error:", error);
        setStatus("error", "Could not start checkout", error.message || "Unknown error.");
        els.actionsBox.classList.remove("hidden");
        els.manualLink.classList.add("secondary");
        els.manualLink.removeAttribute("href");
        els.manualLink.textContent = "Waiting for valid checkout URL";
        els.manualLink.setAttribute("aria-disabled", "true");
      }
    }

    els.retryButton.addEventListener("click", function () {
      window.location.reload();
    });

    boot();
  </script>
</body>
</html>
